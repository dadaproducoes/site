<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1366, initial-scale=1.0" />
<title>DADA Produções</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">

<style>
:root {
  --page-width: 1366px;
  --content-width: 1084px;
  --side-margin: 141px;
  --section-gap: 180px;
  --navy: #17304c;
  --off-white: #ededed;
  --text: #1f1f1f;
}

body {
  margin: 0;
  min-width: var(--page-width);
  background: var(--off-white);
  font-family: 'DM Sans', sans-serif;
}

.page {
  width: var(--page-width);
  margin: 0 auto;
}

.section-shell {
  padding: 0 var(--side-margin);
}

.content {
  width: var(--content-width);
}

.section {
  margin-top: var(--section-gap);
}

/* TIPOGRAFIA */
.section-title {
  font-size: 36px;
  font-weight: 700;
  letter-spacing: 0.5px;
}

.section-subtitle {
  font-size: 22px;
  font-style: italic;
  font-weight: 700;
  letter-spacing: 0.8px;
  margin-top: 24px;
}

.body-text {
  font-size: 19px;
  line-height: 1.5;
  margin-top: 48px;
}

/* HERO */
.hero {
  position: relative;
  width: 1366px;
  height: 768px;
  background: var(--navy);
}

.hero-nav {
  position: absolute;
  top: 44px;
  right: 141px;
  display: flex;
  gap: 20px;
}

.hero-nav a {
  font-size: 16px;
  letter-spacing: 0.8px;
  text-decoration: none;
  color: var(--navy);
}

.hero-brand {
  position: absolute;
  right: 141px;
  bottom: 150px;
  width: 400px;
  text-align: right;
}

.hero-logo {
  width: 400px;
}

.hero-tagline {
  margin-top: 30px;
  font-size: 22px;
  letter-spacing: 0.8px;
}

/* FOTO */
.producer-photo {
  width: 1084px;
  height: 396px;
  margin-top: 48px;
  overflow: hidden;
}

.producer-photo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* EXPERIÊNCIA */
.poster-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  column-gap: 100px;
  margin-top: 48px;
}

.poster-item {
  width: 280px;
  text-align: center;
}

.poster-caption {
  margin-top: 24px;
  font-size: 18px;
}

/* PARCEIRO */
.partner-layout {
  display: grid;
  grid-template-columns: 612px 404px;
  column-gap: 68px;
  margin-top: 48px;
}

.partner-photo {
  width: 404px;
  height: 410px;
  overflow: hidden;
}

.partner-photo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* CONTATO */
.contact-band {
  margin-top: 180px;
  height: 320px;
  background: var(--navy);
  position: relative;
}

.contact-content {
  position: absolute;
  right: 150px;
  top: 50%;
  transform: translateY(-50%);
  text-align: right;
  color: white;
}
</style>
</head>

<body>
<div class="page">

<header class="hero">
  <nav class="hero-nav">
    <a>a produtora</a>
    <a>experiência</a>
    <a>parceiro estratégico</a>
    <a>contato</a>
  </nav>

  <div class="hero-brand">
    <img class="hero-logo" src="logo.png">
    <div class="hero-tagline">linguagem processo realização</div>
  </div>
</header>

<section class="section section-shell">
  <div class="content">
    <h2 class="section-title">a produtora</h2>
    <div class="section-subtitle">Histórias em movimento.</div>

    <p class="body-text">
      Muito prazer, eu sou Luiza Continentino...
    </p>

    <div class="producer-photo">
      <img src="foto-luiza.png">
    </div>

    <p class="body-text">
      É desse percurso...
    </p>
  </div>
</section>

</div>
</body>
</html>
